name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit, strict)
        run: npm run lint

      - name: ESLint
        run: npx eslint . --max-warnings 0

      - name: Unit tests (Vitest)
        run: npm test

      - name: Production build (Vite)
        run: npm run build

      - name: Electron/seed script syntax
        run: |
          node --check electron/main.cjs
          node --check electron/preload.cjs
          node --check scripts/seed.mjs
