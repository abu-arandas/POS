name: Build Windows Installer

# Builds the native Windows installer (.exe) for EA POS on GitHub's own
# windows-latest runner, which has the unrestricted internet access
# electron-builder needs to fetch the Electron runtime + NSIS/winCodeSign
# toolchain. The finished installer is uploaded as a workflow artifact and,
# when the token allows, published as a GitHub Release asset for direct download.

on:
  push:
    branches: [claude/portable-build-delivery-hgp418]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (Vite)
        run: npm run build

      - name: Package Windows installer (electron-builder)
        run: npx electron-builder --win --publish never

      - name: List build output
        shell: bash
        run: ls -la release/

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: EA-POS-Windows-Installer
          path: release/EA-POS-Setup-*.exe
          if-no-files-found: error

      - name: Publish GitHub release with installer
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="win-build-${{ github.run_number }}"
          gh release create "$tag" \
            release/EA-POS-Setup-*.exe \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "EA POS Windows Installer (build ${{ github.run_number }})" \
            --notes "Automated unsigned Windows installer built from ${GITHUB_SHA}. Double-click to install; Windows SmartScreen may warn because the binary is unsigned — choose More info → Run anyway." \
          || echo "::warning::Release publish skipped (token lacks contents:write). Download the installer from this run's artifacts instead."
